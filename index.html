<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abigail's Doula Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background-color: #FDF3F4;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(232, 195, 195, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(210, 180, 185, 0.2) 0%, transparent 55%);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      color: #4A3535;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeIn 1.4s ease;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 210px;
      height: 210px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.7),
        0 0 0 10px rgba(210,175,178,0.35),
        0 12px 40px rgba(140, 90, 95, 0.18);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Photo placeholder — remove once image is added */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #F2D9DB, #E8C0C4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: rgba(120, 75, 80, 0.6);
      text-transform: uppercase;
    }

    /* ── Name ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 2.8rem);
      letter-spacing: 0.04em;
      color: #4A3535;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-style: italic;
      font-weight: 400;
      color: #9E6B6E;
    }

    /* ── Ornament ── */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.25rem auto;
      color: #C9A0A3;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      display: block;
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #C9A0A3);
    }

    .ornament::after {
      background: linear-gradient(to left, transparent, #C9A0A3);
    }

    .ornament-leaf {
      font-size: 0.9rem;
      opacity: 0.75;
    }

    /* ── Coming Soon ── */
    .coming-soon {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.1rem, 3.5vw, 1.35rem);
      letter-spacing: 0.12em;
      color: #9E6B6E;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #7A5555;
      line-height: 1.7;
      opacity: 0.85;
    }

    /* ── Fade in ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .photo-wrap {
        width: 175px;
        height: 175px;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="photo-wrap">
      <!-- REPLACE the div below with: <img src="abigail.jpg" alt="Abigail" /> once photo is saved -->
      <img src="abigail.jpg" alt="Abigail" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="photo-placeholder">Photo coming</div>
    </div>

    <h1>Abigail's<br><em>Doula Services</em></h1>

    <div class="ornament">
      <span class="ornament-leaf">✦</span>
    </div>

    <p class="coming-soon">Coming Soon</p>

    <p class="tagline">
      Faith-filled birth support for Christian families<br>
      in North Texas
    </p>

  </div>
</body>
</html>
